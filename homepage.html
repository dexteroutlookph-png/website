<script>
    // Configuration Keys
    const SUPABASE_PROJECT_URL = "https://qymolbzmovnbiybpktqx.supabase.co"; 
    const SUPABASE_PUBLIC_KEY = "sb_publishable_ZUrTD9os3hvy_tBC6cfLVQ_U7zpjWFf";

    let supabaseClient = null;
    let selectedTargetProfileUser = null; 

    // Local Base64 staging variables
    let stagedFeedFileBase64 = null;
    let stagedProfileFileBase64 = null;

    try {
      if (typeof supabase !== 'undefined') {
        supabaseClient = supabase.createClient(SUPABASE_PROJECT_URL, SUPABASE_PUBLIC_KEY);
      }
    } catch(e) { console.error("Supabase fail:", e); }

    let currentUser = {
      id: "", name: "Anonymous User", email: "guest@isied.org", 
      cluster: "Unassigned Cluster", church: "District General", photo: ""
    };

    const baseDefaultSvg = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiM0MzM4Y2EiLz48L3N2Zz4=";

    // View Switch Engine
    function switchView(viewId, title, element) {
      document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      
      const targetView = document.getElementById(viewId);
      if (targetView) targetView.classList.add('active');
      
      if (element) {
        element.classList.add('active');
      } else {
        const targetNavBtn = document.getElementById(viewId === 'profileView' ? 'navBtnProfile' : 'navBtnFeed');
        if (targetNavBtn) targetNavBtn.classList.add('active');
      }
      
      const titleElem = document.getElementById('viewTitle');
      if (titleElem) titleElem.textContent = title;
      
      if (viewId === 'feedView') {
        loadFeedStream();
      } else if (viewId === 'peopleView') {
        loadPeopleDirectory();
      } else if (viewId === 'profileView') {
        applyProfileViewUIChange(selectedTargetProfileUser ? false : true);
      }
    }

    // Process local photo selection to Base64 data string
    function processComposerFileSelection(input, context) {
      if (!input.files || !input.files[0]) return;
      const file = input.files[0];
      const reader = new FileReader();
      reader.onload = function(e) {
        if (context === 'feed') {
          stagedFeedFileBase64 = e.target.result;
          document.getElementById('feedImgPreviewElement').src = stagedFeedFileBase64;
          document.getElementById('feedImgPreviewBox').style.display = 'block';
        } else {
          stagedProfileFileBase64 = e.target.result;
          document.getElementById('profileImgPreviewElement').src = stagedProfileFileBase64;
          document.getElementById('profileImgPreviewBox').style.display = 'block';
        }
      };
      reader.readAsDataURL(file);
    }

    // Reset local staging photo selection
    function clearSelectedComposerFile(context) {
      if (context === 'feed') {
        stagedFeedFileBase64 = null;
        document.getElementById('feedMediaFileSelector').value = '';
        document.getElementById('feedImgPreviewBox').style.display = 'none';
        document.getElementById('feedImgPreviewElement').src = '';
      } else {
        stagedProfileFileBase64 = null;
        document.getElementById('profileMediaFileSelector').value = '';
        document.getElementById('profileImgPreviewBox').style.display = 'none';
        document.getElementById('profileImgPreviewElement').src = '';
      }
    }

    // Upload Helper for Supabase public storage bucket
    async function uploadBase64ToStorage(base64Str) {
      try {
        const parts = base64Str.split(';base64,');
        const contentType = parts[0].split(':')[1];
        const raw = window.atob(parts[1]);
        const rawLength = raw.length;
        const uInt8Array = new Uint8Array(rawLength);
        for (let i = 0; i < rawLength; ++i) {
          uInt8Array[i] = raw.charCodeAt(i);
        }
        const blob = new Blob([uInt8Array], { type: contentType });
        const pathFileName = `post_media_${Date.now()}_${Math.floor(Math.random() * 100000)}.jpg`;
        
        const { data, error } = await supabaseClient.storage
          .from('avatars')
          .upload(pathFileName, blob, { contentType: contentType });
          
        if (error) throw error;
        
        const { data: publicUrlData } = supabaseClient.storage
          .from('avatars')
          .getPublicUrl(pathFileName);
          
        return publicUrlData.publicUrl;
      } catch (err) {
        console.error("Storage upload failure:", err);
        return null;
      }
    }

    // Format text mentions
    function formatPostContentText(text, usersDirectory = []) {
      if (!text) return "";
      let escapedHtml = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      return escapedHtml.replace(/@([a-zA-Z0-9_\s]{3,30})/g, (match, capturedName) => {
        const trimmed = capturedName.trim();
        const found = usersDirectory.find(u => u.full_name && u.full_name.toLowerCase() === trimmed.toLowerCase());
        if (found) {
          return `<span class="mention-link" onclick="event.stopPropagation(); navigateToUserById('${found.id}')">@${found.full_name}</span>`;
        }
        return match; 
      });
    }

    // Initialize User Data Profile
    async function initUserProfile() {
      if (!supabaseClient) {
        applyProfileViewUIChange(true);
        return;
      }
      try {
        const { data: { user }, error: authError } = await supabaseClient.auth.getUser();
        if (authError || !user) {
          applyProfileViewUIChange(true);
          return;
        }

        const { data: profile } = await supabaseClient
          .from('profiles')
          .select('*')
          .eq('id', user.id)
          .maybeSingle();

        currentUser.id = user.id;
        currentUser.email = user.email || currentUser.email;
        currentUser.name = user.user_metadata?.full_name || "User Account";

        if (profile) {
          currentUser.name = profile.full_name || currentUser.name;
          currentUser.email = profile.email || currentUser.email; 
          currentUser.cluster = profile.cluster || currentUser.cluster;
          currentUser.church = profile.local_church || currentUser.church;
          currentUser.photo = profile.avatar_url || currentUser.photo;
        }

        document.getElementById('composerAvatar').src = currentUser.photo || baseDefaultSvg;
        document.getElementById('profileComposerAvatar').src = currentUser.photo || baseDefaultSvg;

        // Securely bind the Avatar Picker hooks
        bindAvatarPickerActions();

        applyProfileViewUIChange(true);
      } catch (err) {
        console.error("Profile load error:", err);
        applyProfileViewUIChange(true);
      } finally {
        loadFeedStream();
      }
    }

    // Avatar Picker with Centered Square Cropper
    function bindAvatarPickerActions() {
      const uploadTriggerBtn = document.getElementById('changeAvatarBtn');
      const hiddenFileSelector = document.getElementById('avatarFileSelector');

      if (!uploadTriggerBtn || !hiddenFileSelector) return;

      uploadTriggerBtn.replaceWith(uploadTriggerBtn.cloneNode(true));
      const activeUploadBtn = document.getElementById('changeAvatarBtn');

      activeUploadBtn.addEventListener('click', () => {
        hiddenFileSelector.click();
      });

      hiddenFileSelector.addEventListener('change', async function() {
        if (!this.files || !this.files[0]) return;
        
        const selectedFile = this.files[0];
        const reader = new FileReader();

        activeUploadBtn.textContent = "Processing...";
        activeUploadBtn.disabled = true;

        reader.onload = function(e) {
          const img = new Image();
          img.onload = async function() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const targetDimension = 400;
            canvas.width = targetDimension;
            canvas.height = targetDimension;

            let sourceX = 0, sourceY = 0, sourceWidth = img.width, sourceHeight = img.height;

            if (img.width > img.height) {
              sourceWidth = img.height;
              sourceX = (img.width - img.height) / 2;
            } else if (img.height > img.width) {
              sourceHeight = img.width;
              sourceY = (img.height - img.width) / 2;
            }

            ctx.drawImage(img, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, targetDimension, targetDimension);
            const croppedBase64String = canvas.toDataURL('image/jpeg', 0.85);

            try {
              const remoteStorageUrl = await uploadBase64ToStorage(croppedBase64String);
              
              if (remoteStorageUrl) {
                const { error: dbUpdateError } = await supabaseClient
                  .from('profiles')
                  .update({ avatar_url: remoteStorageUrl })
                  .eq('id', currentUser.id);

                if (dbUpdateError) throw dbUpdateError;

                currentUser.photo = remoteStorageUrl;
                document.getElementById('profAvatar').src = remoteStorageUrl;
                document.getElementById('composerAvatar').src = remoteStorageUrl;
                document.getElementById('profileComposerAvatar').src = remoteStorageUrl;
                
                activeUploadBtn.textContent = "Change Photo";
              }
            } catch (err) {
              console.error("Avatar update execution failed:", err);
              activeUploadBtn.textContent = "Upload Failed";
            } finally {
              activeUploadBtn.disabled = false;
            }
          };
          img.src = e.target.result;
        };

        reader.readAsDataURL(selectedFile);
      });
    }

    // Pull Global Feed Stream
    async function loadFeedStream() {
      const stream = document.getElementById('newsfeedStream');
      if (!supabaseClient) return;
      try {
        const { data: posts, error } = await supabaseClient
          .from('posts')
          .select('*')
          .order('createdat', { ascending: false });

        if (error) throw error;
        stream.innerHTML = '';

        if (!posts || posts.length === 0) {
          stream.innerHTML = `<p style="color:#94a3b8; text-align:center; padding-top:40px;">No threads shared yet.</p>`;
          return;
        }

        const { data: profiles } = await supabaseClient.from('profiles').select('*');
        const profileMap = {};
        if (profiles) profiles.forEach(p => { profileMap[p.id] = p; });

        posts.forEach(post => {
          const time = post.createdat ? new Date(post.createdat).toLocaleString() : 'Just now';
          
          let activeProfile = profileMap[post.user_id];
          let avatarSrc = activeProfile?.avatar_url || post.avatar_url || baseDefaultSvg;
          let displayName = activeProfile?.full_name || post.name || 'Anonymous';

          if (post.user_id === currentUser.id && currentUser.photo) {
            avatarSrc = currentUser.photo;
          }

          let imageMarkup = "";
          if (post.image_url) {
            imageMarkup = `<img src="${post.image_url}" style="width:100%; border-radius:12px; margin-top:10px; max-height:340px; object-fit:cover; display:block;" />`;
          }

          let textMarkup = post.content ? `<div class="thread-content">${formatPostContentText(post.content, profiles)}</div>` : '';
          if (!post.content && post.image_url) {
            imageMarkup = `<div style="padding-left: 50px;">${imageMarkup}</div>`;
          }

          const card = document.createElement('div');
          card.className = 'thread-card';
          card.id = `post-card-${post.id}`;
          card.innerHTML = `
            <div class="thread-header">
              <img class="thread-avatar clickable-target" src="${avatarSrc}" data-uid="${post.user_id || ''}">
              <div>
                <div class="thread-user clickable-target" data-uid="${post.user_id || ''}">@${displayName}</div>
                <div style="font-size:0.75rem; color:#64748b;">${time}</div>
              </div>
            </div>
            ${textMarkup}
            ${imageMarkup}
          `;

          card.querySelectorAll('.clickable-target').forEach(el => {
            el.addEventListener('click', function(e) {
              e.preventDefault();
              e.stopPropagation();
              const uid = this.getAttribute('data-uid');
              if (uid) navigateToUserById(uid);
            });
          });

          stream.appendChild(card);
        });
      } catch (err) { console.error(err); }
    }

    // Submit Feed Post
    document.getElementById('inlineThreadForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const text = document.getElementById('inlineThreadContent').value.trim();
      const statusField = document.getElementById('inlinePostStatus');
      
      if (!supabaseClient) return;
      if (!text && !stagedFeedFileBase64) {
        alert("Please add text or select an image to post.");
        return;
      }

      try {
        statusField.textContent = "Publishing update to Sphere...";
        let remoteFileUploadedUrl = null;
        
        if (stagedFeedFileBase64) {
          remoteFileUploadedUrl = await uploadBase64ToStorage(stagedFeedFileBase64);
        }

        await supabaseClient.from('posts').insert([{ 
          user_id: currentUser.id,
          name: currentUser.name, 
          email: currentUser.email, 
          content: text || null,
          image_url: remoteFileUploadedUrl,
          avatar_url: currentUser.photo,
          createdat: new Date().toISOString()
        }]);
        
        document.getElementById('inlineThreadContent').value = '';
        clearSelectedComposerFile('feed');
        statusField.textContent = "";
        loadFeedStream();
      } catch (err) { 
        console.error(err);
        statusField.textContent = "Submission error. Try again.";
      }
    });

    // Profile Composer Submission
    document.getElementById('profilePostForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const text = document.getElementById('profilePostContent').value.trim();
      
      if (!supabaseClient) return;
      if (!text && !stagedProfileFileBase64) {
        alert("Please write a comment or attach an image.");
        return;
      }

      try {
        let remoteFileUploadedUrl = null;
        if (stagedProfileFileBase64) {
          remoteFileUploadedUrl = await uploadBase64ToStorage(stagedProfileFileBase64);
        }

        await supabaseClient.from('posts').insert([{
          user_id: currentUser.id,
          name: currentUser.name,
          email: currentUser.email,
          content: text || null,
          image_url: remoteFileUploadedUrl,
          avatar_url: currentUser.photo,
          createdat: new Date().toISOString()
        }]);
        
        document.getElementById('profilePostContent').value = '';
        clearSelectedComposerFile('profile');
        renderProfileTimeline();
      } catch (err) { console.error(err); }
    });

    // Directory Loader
    async function loadPeopleDirectory() {
      const container = document.getElementById('peopleDirectoryList');
      if(!supabaseClient) return;
      
      try {
        const { data: usersList, error } = await supabaseClient
          .from('profiles')
          .select('*')
          .order('full_name', { ascending: true });
          
        if(error) throw error;
        container.innerHTML = '';
        
        if(!usersList || usersList.length === 0) {
          container.innerHTML = '<p style="color:#64748b; text-align:center;">No users registered yet.</p>';
          return;
        }
        
        usersList.forEach(userRecord => {
          const userAvatar = userRecord.avatar_url || baseDefaultSvg;
          const userSubtext = `${userRecord.cluster || 'No Cluster'} • ${userRecord.local_church || 'General Church'}`;
          
          const row = document.createElement('div');
          row.className = 'user-dir-item';
          row.innerHTML = `
            <div class="user-dir-info">
              <img class="thread-avatar clickable-target" src="${userAvatar}" data-uid="${userRecord.id}">
              <div>
                <div class="thread-user clickable-target" data-uid="${userRecord.id}">@${userRecord.full_name || 'Anonymous User'}</div>
                <div style="font-size:0.75rem; color:#64748b;">${userSubtext}</div>
              </div>
            </div>
            <button class="view-profile-action-btn" onclick="navigateToUserById('${userRecord.id}')">View</button>
          `;

          row.querySelectorAll('.clickable-target').forEach(el => {
            el.addEventListener('click', function(e) {
              e.preventDefault();
              e.stopPropagation();
              navigateToUserById(this.getAttribute('data-uid'));
            });
          });

          container.appendChild(row);
        });
      } catch(e) { console.error(e); }
    }

    async function navigateToUserById(userId) {
      if (!userId) return;
      if (String(userId) === String(currentUser.id)) { resetToOwnProfile(); return; }
      try {
        const { data: p } = await supabaseClient.from('profiles').select('*').eq('id', userId).single();
        if (p) {
          selectedTargetProfileUser = { 
            id: p.id, name: p.full_name, email: p.email, 
            cluster: p.cluster, church: p.local_church, photo: p.avatar_url 
          };
          switchView('profileView', `@${p.full_name}`, null);
        }
      } catch (e) { console.error(e); }
    }

    function resetToOwnProfile() { 
      selectedTargetProfileUser = null; 
      switchView('profileView', 'Profile', null);
    }

    // Profile View UI Syncing Card
    function applyProfileViewUIChange(isOwnProfile) {
      const active = isOwnProfile ? currentUser : selectedTargetProfileUser;
      if (!active) return;
      
      document.getElementById('profName').textContent = active.name || 'Anonymous';
      document.getElementById('profEmail').textContent = active.email || '';
      document.getElementById('profDetails').textContent = `${active.cluster || 'No Cluster'} • ${active.church || 'General Church'}`;
      document.getElementById('profAvatar').src = active.photo || baseDefaultSvg;
      
      document.getElementById('profileContextBanner').style.display = isOwnProfile ? 'none' : 'flex';
      document.getElementById('avatarControlWrapper').style.display = isOwnProfile ? 'block' : 'none';
      document.getElementById('profileSignOutRow').style.display = isOwnProfile ? 'block' : 'none';
      document.getElementById('profilePostComposerCard').style.display = isOwnProfile ? 'block' : 'none';
      document.getElementById('timelineHeadingText').textContent = isOwnProfile ? "My Timeline" : `${active.name}'s Timeline`;
      
      renderProfileTimeline();
    }

    // Profile Timeline Stream
    async function renderProfileTimeline() {
      const feed = document.getElementById('profileTimelineFeed');
      if (!supabaseClient) return;
      const targetUserId = selectedTargetProfileUser ? selectedTargetProfileUser.id : currentUser.id;

      try {
        const { data: posts } = await supabaseClient
          .from('posts')
          .select('*')
          .eq('user_id', targetUserId)
          .order('createdat', { ascending: false });

        feed.innerHTML = '';
        if(!posts || posts.length === 0) {
          feed.innerHTML = '<p style="color:#64748b; text-align:center; padding:20px;">No updates shared here yet.</p>';
          return;
        }

        posts.forEach(post => {
          let textMarkup = post.content ? `<div class="thread-content" style="padding-left:0; margin-top:6px;">${post.content}</div>` : '';
          
          let imageMarkup = "";
          if (post.image_url) {
            imageMarkup = `<img src="${post.image_url}" style="width:100%; border-radius:12px; margin-top:10px; max-height:300px; object-fit:cover; display:block;" />`;
          }

          let deleteButtonMarkup = "";
          if (String(post.user_id) === String(currentUser.id)) {
            deleteButtonMarkup = `
              <div class="post-actions-bar" style="margin-top: 12px; border-top: 1px solid #1e293b; padding-top: 8px;">
                <button class="action-trigger delete-post-btn" data-postid="${post.id}" data-imgurl="${post.image_url || ''}" style="color: #ef4444; margin-left: auto; cursor: pointer;">
                  🗑️ Delete Post
                </button>
              </div>
            `;
          }

          const card = document.createElement('div');
          card.className = 'thread-card';
          card.id = `profile-post-card-${post.id}`;
          card.innerHTML = `
            <div class="thread-header">
              <img class="thread-avatar" src="${post.avatar_url || (selectedTargetProfileUser ? selectedTargetProfileUser.photo : currentUser.photo) || baseDefaultSvg}">
              <div>
                <div class="thread-user">@${post.name || 'Anonymous'}</div>
                <div style="font-size:0.75rem; color:#64748b;">${post.createdat ? new Date(post.createdat).toLocaleString() : ''}</div>
              </div>
            </div>
            ${textMarkup}
            ${imageMarkup}
            ${deleteButtonMarkup}
          `;

          if (String(post.user_id) === String(currentUser.id)) {
            card.querySelector('.delete-post-btn').addEventListener('click', function(e) {
              e.preventDefault();
              e.stopPropagation();
              executePostDeletion(this.getAttribute('data-postid'), this.getAttribute('data-imgurl'));
            });
          }

          feed.appendChild(card);
        });
      } catch(e) { console.error(e); }
    }

    // Complete Deletion Pipeline (Database Row Drop + Storage Bucket File Wipe)
    async function executePostDeletion(postId, imageUrl) {
      if (!postId || !supabaseClient) return;
      
      if (!confirm("Are you sure you want to permanently delete this post? This will also remove any attached media from storage.")) {
        return;
      }

      try {
        // 1. If an image exists, parse out its exact filename and clear it from the bucket
        if (imageUrl && imageUrl.includes('/avatars/')) {
          try {
            const urlParts = imageUrl.split('/avatars/');
            const storageFilename = urlParts[urlParts.length - 1]; // Pulls the unique string name
            
            if (storageFilename) {
              await supabaseClient.storage.from('avatars').remove([storageFilename]);
            }
          } catch(storageErr) {
            console.warn("Storage asset sanitation bypass error:", storageErr);
          }
        }

        // 2. Remove layout component item from current DOM interface view instantly
        const targetedCard = document.getElementById(`profile-post-card-${postId}`);
        if (targetedCard) targetedCard.remove();

        // 3. Drop relational table entry row inside Supabase
        const { error } = await supabaseClient
          .from('posts')
          .delete()
          .eq('id', postId)
          .eq('user_id', currentUser.id);

        if (error) throw error;
      } catch (err) {
        console.error("Failed to execute post deletion flow:", err);
        alert("Could not complete delete transaction safely. Re-syncing stream.");
        renderProfileTimeline();
      }
    }

    async function logout() {
      if (supabaseClient) {
        try {
          await supabaseClient.auth.signOut();
        } catch (err) { console.error("Session clear error:", err); }
        currentUser = { id: "", name: "Anonymous User", email: "guest@isied.org", cluster: "Unassigned Cluster", church: "District General", photo: "" };
        window.location.href = "index.html";
      }
    }

    document.addEventListener('DOMContentLoaded', initUserProfile);
  </script>
