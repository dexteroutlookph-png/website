<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouthSphere | Home</title>
  <link rel="stylesheet" href="styles.css">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.js"></script>
  <style>
    body { display: block; padding: 0; overflow-x: hidden; background-color: #0b1329; }
    .app-container { max-width: 600px; margin: 0 auto; padding-bottom: 90px; min-height: 100vh; display: flex; flex-direction: column; }
    .app-header { position: sticky; top: 0; background: rgba(7, 20, 38, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 100; padding: 16px; text-align: center; border-bottom: 1px solid #1e293b; }
    .app-header h2 { margin: 0; font-size: 1.3rem; color: #fff; font-weight: 700; }
    .threads-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border-top: 1px solid #1e293b; display: flex; justify-content: space-around; padding: 16px 0; z-index: 200; }
    .nav-item { background: none; border: none; color: #64748b; font-size: 0.95rem; font-weight: 600; cursor: pointer; padding: 8px 32px; border-radius: 20px; transition: all 0.2s ease; }
    .nav-item:hover { color: #fff; }
    .nav-item.active { color: #6366f1; background: rgba(99, 102, 241, 0.1); }
    .app-view { display: none; padding: 16px; flex-grow: 1; }
    .app-view.active { display: block; animation: feedFadeIn 0.2s ease-out; }
    @keyframes feedFadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .thread-card, .ui-panel-card { background: #1e293b; padding: 18px; border-radius: 16px; margin-bottom: 14px; border: 1px solid #334155; }
    .thread-header { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; color: #94a3b8; margin-bottom: 10px; }
    .thread-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; background: #4338ca; border: 1.5px solid #4f46e5; }
    .thread-user { font-weight: 700; color: #fff; font-size: 0.95rem; }
    .thread-content { font-size: 1rem; color: #e2e8f0; line-height: 1.5; padding-left: 50px; word-break: break-word; }
    .inline-composer { background: #11192e; border: 1px solid #243249; padding: 16px; border-radius: 16px; margin-bottom: 20px; }
    .composer-layout { display: flex; gap: 12px; }
    .composer-fields { flex-grow: 1; }
    .inline-composer textarea { width: 100%; background: transparent; border: none; color: #fff; font-size: 1rem; resize: none; min-height: 50px; padding: 4px 0; }
    .inline-composer textarea:focus { outline: none; }
    .composer-actions { display: flex; justify-content: flex-end; margin-top: 8px; border-top: 1px solid #1e293b; padding-top: 10px; }
    .composer-actions button { padding: 6px 18px; font-size: 0.85rem; border-radius: 20px; font-weight: 700; }
    .event-item { padding: 16px; border-bottom: 1px solid #334155; display: flex; gap: 16px; align-items: flex-start; }
    .event-item:last-child { border-bottom: none; }
    .event-date-badge { background: #4f46e5; color: #fff; padding: 8px; border-radius: 10px; text-align: center; min-width: 55px; font-weight: bold; }
    .event-date-badge .day { font-size: 1.2rem; display: block; }
    .event-date-badge .month { font-size: 0.75rem; text-transform: uppercase; }
    .event-details h4 { margin: 0 0 4px 0; color: #fff; font-size: 1.1rem; }
    .event-meta { font-size: 0.85rem; color: #94a3b8; }
    .profile-hero { text-align: center; padding: 24px 0 12px; }
    .profile-hero .large-avatar { width: 96px; height: 96px; border-radius: 50%; object-fit: cover; margin: 0 auto 14px; display: block; border: 2.5px solid #6366f1; }
    .profile-hero h2 { margin: 0 0 6px 0; color: #fff; font-size: 1.4rem; }
    .profile-meta { color: #94a3b8; font-size: 0.9rem; margin-bottom: 4px; }
  </style>
</head>
<body>

  <div class="app-container">
    <header class="app-header"><h2 id="viewTitle">YouthSphere</h2></header>

    <main id="feedView" class="app-view active">
      <div class="inline-composer">
        <form id="inlineThreadForm">
          <div class="composer-layout">
            <img class="thread-avatar" id="composerAvatar" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiM0MzM4Y2EiLz48L3N2Zz4=" alt="User">
            <div class="composer-fields">
              <textarea id="inlineThreadContent" placeholder="Share a church update or start a thread..." required></textarea>
            </div>
          </div>
          <div class="composer-actions">
            <button type="submit" class="primary-button" id="publishBtn">Post Thread</button>
          </div>
        </form>
        <div id="inlinePostStatus" style="margin-top: 8px; font-size: 0.85rem; padding-left: 50px;"></div>
      </div>

      <div id="newsfeedStream"><p style="color: #94a3b8; text-align: center;">Syncing feed...</p></div>
    </main>

    <section id="eventsView" class="app-view">
      <div class="ui-panel-card">
        <h3>District Events</h3>
        <p style="color:#94a3b8; font-size:0.9rem; margin-bottom:20px;">Upcoming youth gathers across ISIED.</p>
        <div class="event-item">
          <div class="event-date-badge"><span class="day">28</span><span class="month">Jun</span></div>
          <div class="event-details">
            <h4>District Youth Fellowship Summit</h4>
            <div class="event-meta">⏰ 9:00 AM • 📍 District Central Church Hall</div>
          </div>
        </div>
      </div>
    </section>

    <section id="profileView" class="app-view">
      <div class="ui-panel-card" style="margin-bottom: 16px;">
        <div class="profile-hero">
          <img class="large-avatar" id="profAvatar" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiM0MzM4Y2EiLz48L3N2Zz4=" alt="Avatar">
          <div style="margin-top: 10px;">
            <input type="file" id="avatarFileSelector" accept="image/*" style="display: none;" />
            <button type="button" id="changeAvatarBtn" style="background: #243249; color: #fff; border: 1px solid #3b4f6e; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;">Change Photo</button>
          </div>
          <h2 id="profName">Loading Profile...</h2>
          <div class="profile-meta" id="profEmail">loading@email.com</div>
          <div class="profile-meta" id="profDetails" style="color:#6366f1; font-weight:600; margin-top:6px;">Cluster Details</div>
        </div>
        <div style="border-top:1px solid #334155; padding-top:16px; text-align:center;">
          <button onclick="logout()" class="primary-button" style="background:#ef4444; width:auto; padding:8px 20px; border-radius:20px; font-size:0.85rem; font-weight:700; border:none; color:white; cursor:pointer;">Sign Out</button>
        </div>
      </div>

      <div class="ui-panel-card" style="margin-bottom: 16px; padding: 16px;">
        <form id="profilePostForm">
          <div style="display: flex; gap: 12px; align-items: flex-start;">
            <img class="thread-avatar" id="profileComposerAvatar" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiM0MzM4Y2EiLz48L3N2Zz4=" alt="Mini Avatar" style="width:36px; height:36px;" />
            <textarea id="profilePostContent" placeholder="Share a thought..." style="flex: 1; background: #11192e; border: 1px solid #243249; border-radius: 12px; padding: 10px 14px; color: #fff; font-size: 0.95rem; min-height: 40px; resize: none; outline: none; font-family: inherit;" required></textarea>
          </div>

          <div id="profileImagePreviewContainer" style="display: none; margin-top: 12px; position: relative; border-radius: 12px; overflow: hidden; max-height: 260px; background: #11192e; border: 1px solid #243249;">
            <button type="button" id="profileRemoveImageBtn" style="position: absolute; top: 8px; right: 8px; background: rgba(15, 23, 42, 0.85); color: #fff; border: none; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; z-index:10;">&times;</button>
            <img id="profileImagePreview" src="" alt="Attached Preview" style="width: 100%; height: 100%; object-fit: contain; max-height:260px;" />
          </div>

          <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 10px; border-top: 1px solid #1e293b;">
            <input type="file" id="profilePhotoInput" accept="image/*" style="display: none;" />
            <label for="profilePhotoInput" style="display: flex; align-items: center; gap: 6px; color: #22c55e; font-size: 0.85rem; font-weight: 700; cursor: pointer; padding: 6px 12px; border-radius: 20px; background: rgba(34, 197, 94, 0.08); transition: background 0.2s;">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
              </svg>
              Photo
            </label>
            <button type="submit" class="primary-button submit-post-btn" style="padding: 6px 18px; font-size: 0.85rem; border-radius: 20px; font-weight: 700; cursor:pointer; background: #6366f1; color: white; border: none;">Post</button>
          </div>
        </form>
      </div>

      <h3 style="font-size: 1rem; font-weight: 700; color: #94a3b8; margin: 24px 0 12px 4px; text-transform: uppercase; letter-spacing: 0.5px;">My Timeline</h3>
      <div id="profileTimelineFeed">
        <p style="color: #94a3b8; text-align: center;">Loading timeline entries...</p>
      </div>
    </section>

    <nav class="threads-nav">
      <button class="nav-item active" onclick="switchView('feedView', 'Home Feed', this)">Feed</button>
      <button class="nav-item" onclick="switchView('eventsView', 'Events', this)">Events</button>
      <button class="nav-item" onclick="switchView('profileView', 'Profile', this)">Profile</button>
    </nav>
  </div>

  <div id="cropperModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#11192e; border:1px solid #243249; padding:20px; border-radius:12px; width:90%; max-width:400px; text-align:center;">
      <h3 style="color:#fff; margin-top:0;">Crop Profile Photo</h3>
      <div id="cropperViewport" style="width:100%; height:250px; margin-bottom:20px;"></div>
      <div style="display:flex; gap:10px; justify-content:center;">
        <button type="button" id="cancelCropBtn" style="background:#334155; color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">Cancel</button>
        <button type="button" id="saveCropBtn" style="background:#16a34a; color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">Crop & Upload</button>
      </div>
    </div>
  </div>

  <script>
    // 1. Navigation Controller 
    function switchView(viewId, title, element) {
      document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      
      const targetView = document.getElementById(viewId);
      if (targetView) targetView.classList.add('active');
      if (element) element.classList.add('active');
      
      const titleElem = document.getElementById('viewTitle');
      if (titleElem) titleElem.textContent = title;
      
      if (viewId === 'feedView') {
        loadFeedStream();
      } else if (viewId === 'profileView') {
        renderProfileTimeline();
      }
    }

    // 2. Cloud Configuration
    const SUPABASE_PROJECT_URL = "https://qymolbzmovnbiybpktqx.supabase.co"; 
    const SUPABASE_PUBLIC_KEY = "sb_publishable_ZUrTD9os3hvy_tBC6cfLVQ_U7zpjWFf";
    
    const CLOUDINARY_CLOUD_NAME = "dwpj4pkrq"; 
    const CLOUDINARY_PRESET_NAME = "youthsphere";
    const CLOUDINARY_UPLOAD_URL = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`;

    let supabaseClient = null;
    let activeCropperInstance = null;

    try {
      if (typeof supabase !== 'undefined') {
        supabaseClient = supabase.createClient(SUPABASE_PROJECT_URL, SUPABASE_PUBLIC_KEY);
      }
    } catch(e) {
      console.error("Supabase failed to initialize:", e);
    }

    let currentUser = {
      name: "Anonymous User", 
      email: "guest@isied.org", 
      cluster: "Unassigned Cluster", 
      church: "District General", 
      photo: ""
    };

    let selectedFileObject = null;

    // 3. Avatar Modification Interceptors (Croppie Flow)
    document.getElementById('changeAvatarBtn').addEventListener('click', () => {
      document.getElementById('avatarFileSelector').click();
    });

    document.getElementById('avatarFileSelector').addEventListener('change', function(e) {
      if (!e.target.files || !e.target.files[0]) return;
      
      const targetFile = e.target.files[0];
      const fileReader = new FileReader();
      
      fileReader.onload = function(event) {
        const modal = document.getElementById('cropperModal');
        modal.style.display = 'flex';
        
        if (activeCropperInstance) activeCropperInstance.destroy();
        
        activeCropperInstance = new Croppie(document.getElementById('cropperViewport'), {
          viewport: { width: 150, height: 150, type: 'circle' },
          boundary: { width: 250, height: 250 },
          showZoomer: true
        });
        
        activeCropperInstance.bind({ url: event.target.result });
      };
      
      fileReader.readAsDataURL(targetFile);
    });

    document.getElementById('cancelCropBtn').addEventListener('click', () => {
      document.getElementById('cropperModal').style.display = 'none';
      document.getElementById('avatarFileSelector').value = '';
    });

    document.getElementById('saveCropBtn').addEventListener('click', function() {
      if (!activeCropperInstance) return;
      
      const changeBtn = document.getElementById('changeAvatarBtn');
      const cropModal = document.getElementById('cropperModal');
      
      changeBtn.disabled = true;
      changeBtn.textContent = "Processing...";

      activeCropperInstance.result({
        type: 'blob',
        size: 'viewport',
        format: 'jpeg'
      }).then(async function(croppedBlob) {
        if (!croppedBlob) {
          throw new Error("Cropper background engine failed to generate an output file.");
        }

        cropModal.style.display = 'none';

        try {
          const uploadPayload = new FormData();
          uploadPayload.append('file', croppedBlob, 'avatar.jpg');
          uploadPayload.append('upload_preset', CLOUDINARY_PRESET_NAME);

          const serverResponse = await fetch(CLOUDINARY_UPLOAD_URL, {
            method: 'POST',
            body: uploadPayload
          });

          if (!serverResponse.ok) {
            const errDetails = await serverResponse.json().catch(() => ({}));
            throw new Error(errDetails.error?.message || 'Cloudinary upload failed.');
          }
          
          const parsedResponseData = await serverResponse.json();
          const cleanSecureUrl = parsedResponseData.secure_url;

          const { data: { user } } = await supabaseClient.auth.getUser();
          
          const { data, error: dbError } = await supabaseClient
            .from('profiles')
            .update({ avatar_url: cleanSecureUrl }) 
            .eq('id', user.id)
            .select();

          if (dbError) throw dbError;

          if (!data || data.length === 0) {
            throw new Error("RLS Policy Blocked: The database accepted the request but refused to save it. Make sure your UPDATE policy is active for authenticated users.");
          }

          currentUser.photo = cleanSecureUrl;
          document.getElementById('profAvatar').src = cleanSecureUrl;
          if(document.getElementById('composerAvatar')) document.getElementById('composerAvatar').src = cleanSecureUrl;
          if(document.getElementById('profileComposerAvatar')) document.getElementById('profileComposerAvatar').src = cleanSecureUrl;

          alert("Profile photo updated permanently!");
          
          loadFeedStream();
          renderProfileTimeline();

        } catch (err) {
          console.error("Database Save Error:", err);
          alert("Error: " + err.message);
        } finally {
          changeBtn.disabled = false;
          changeBtn.textContent = "Change Photo";
          document.getElementById('avatarFileSelector').value = '';
        }
      }).catch(function(cropErr) {
        alert("Failed to render the cropped photo region.");
        cropModal.style.display = 'none';
        changeBtn.disabled = false;
        changeBtn.textContent = "Change Photo";
      });
    });

    // 4. Authenticate User & Fetch Cloud Public Profile
    async function initUserProfile() {
      if (!supabaseClient) {
        document.getElementById('profName').textContent = currentUser.name;
        document.getElementById('profEmail').textContent = currentUser.email;
        document.getElementById('profDetails').textContent = `${currentUser.cluster} • ${currentUser.church}`;
        return;
      }
      try {
        const { data: { user }, error: authError } = await supabaseClient.auth.getUser();
        
        if (authError || !user) {
          console.warn("No active session found.");
          return;
        }

        const { data: profile, error: dbError } = await supabaseClient
          .from('profiles')
          .select('full_name, cluster, local_church, avatar_url') 
          .eq('id', user.id)
          .single();

        if (dbError) throw dbError;

        if (profile) {
          currentUser.name = profile.full_name || currentUser.name;
          currentUser.email = user.email || currentUser.email; 
          currentUser.cluster = profile.cluster || currentUser.cluster;
          currentUser.church = profile.local_church || currentUser.church;
          currentUser.photo = profile.avatar_url || currentUser.photo;
        }

        document.getElementById('profName').textContent = currentUser.name;
        document.getElementById('profEmail').textContent = currentUser.email;
        document.getElementById('profDetails').textContent = `${currentUser.cluster} • ${currentUser.church}`;
        
        if (currentUser.photo) {
          document.getElementById('profAvatar').src = currentUser.photo;
          document.getElementById('composerAvatar').src = currentUser.photo;
          document.getElementById('profileComposerAvatar').src = currentUser.photo;
        }

      } catch (err) {
        console.error("Profile load error:", err.message);
        document.getElementById('profName').textContent = currentUser.name;
      } finally {
        loadFeedStream();
      }
    }

   // 5. Load Public Global Newsfeed Feed From Supabase (Bulletproof Hybrid View)
    async function loadFeedStream() {
      const stream = document.getElementById('newsfeedStream');
      if (!supabaseClient) {
        stream.innerHTML = `<p style="color:#94a3b8; text-align:center; padding-top:40px;">Please configure your Supabase Credentials.</p>`;
        return;
      }
      try {
        // Attempt a clean flat select first to guarantee the feed NEVER crashes
        const { data: posts, error } = await supabaseClient
          .from('posts')
          .select('*')
          .order('createdat', { ascending: false });

        if (error) throw error;

        stream.innerHTML = '';
        if (!posts || posts.length === 0) {
          stream.innerHTML = `<p style="color:#94a3b8; text-align:center; padding-top:40px;">No threads shared yet.</p>`;
          return;
        }

        // Fetch all profiles in one quick parallel request to map live avatars manually
        const { data: profiles } = await supabaseClient.from('profiles').select('id, avatar_url');
        const profileMap = {};
        if (profiles) {
          profiles.forEach(p => { profileMap[p.id] = p.avatar_url; });
        }

        posts.forEach(post => {
          const time = post.createdat ? new Date(post.createdat).toLocaleString() : 'Just now';
          
          // Hybrid Sync Strategy:
          // 1. Look for a live matching profile avatar in our map using user_id
          // 2. If it's a match for you locally, use your fresh cached image
          // 3. Fallback to whatever string was saved on the post
          // 4. Fallback to default SVG placeholder
          let avatarSrc = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiM0MzM4Y2EiLz48L3N2Zz4=";
          
          if (post.user_id && profileMap[post.user_id]) {
            avatarSrc = profileMap[post.user_id];
          } else if (currentUser && post.email === currentUser.email && currentUser.photo) {
            avatarSrc = currentUser.photo;
          } else if (post.avatar_url) {
            avatarSrc = post.avatar_url;
          }
          
          let textMarkup = post.content ? `<div class="thread-content">${post.content}</div>` : '';
          let imageMarkup = post.image_url ? `<img src="${post.image_url}" style="width:calc(100% - 50px); border-radius:12px; margin:10px 0 0 50px; max-height:350px; object-fit:cover; background:#11192e; border:1px solid #243249;" alt="Feed Asset" />` : '';
          
          const card = document.createElement('div');
          card.className = 'thread-card';
          card.innerHTML = `
            <div class="thread-header">
              <img class="thread-avatar" src="${avatarSrc}">
              <div>
                <div class="thread-user">@${post.name}</div>
                <div style="font-size:0.75rem; color:#64748b;">${time}</div>
              </div>
            </div>
            ${textMarkup}
            ${imageMarkup}
          `;
          stream.appendChild(card);
        });
      } catch (err) {
        console.error("Feed rendering runtime error:", err);
        stream.innerHTML = `<p style="color:#ef4444; text-align:center;">Failed to pull live cloud feed.</p>`;
      }
    }

    // 6. Submit New Thread Post (Home tab)
    document.getElementById('inlineThreadForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      if (!supabaseClient) return;
      const text = document.getElementById('inlineThreadContent');
      const status = document.getElementById('inlinePostStatus');
      const btn = document.getElementById('publishBtn');

      status.style.color = '#94a3b8';
      status.textContent = 'Publishing thread...';
      btn.disabled = true;

      try {
        const { data: { user } } = await supabaseClient.auth.getUser();

        const { error } = await supabaseClient.from('posts').insert([
          { 
            user_id: user.id,
            name: currentUser.name, 
            email: currentUser.email, 
            content: text.value,
            avatar_url: currentUser.photo,
            createdat: new Date().toISOString()
          }
        ]);

        if (error) throw error;

        text.value = '';
        status.style.color = '#16a34a';
        status.textContent = 'Thread shared!';
        loadFeedStream();
        setTimeout(() => { status.textContent = ''; }, 2000);
      } catch (err) {
        status.style.color = '#ef4444';
        status.textContent = 'Database rejection.';
      } finally {
        btn.disabled = false;
      }
    });

    // 7. Handle Image Attachment Preview Configurations
    const profilePhotoInput = document.getElementById('profilePhotoInput');
    const profileImagePreviewContainer = document.getElementById('profileImagePreviewContainer');
    const profileImagePreview = document.getElementById('profileImagePreview');
    const profilePostContent = document.getElementById('profilePostContent');

    profilePhotoInput.addEventListener('change', function(e) {
      if (e.target.files && e.target.files[0]) {
        selectedFileObject = e.target.files[0];
        const localBrowserUrl = URL.createObjectURL(selectedFileObject);
        
        profileImagePreview.src = localBrowserUrl;
        profileImagePreviewContainer.style.display = 'block';
        profilePostContent.required = false;
      }
    });

    document.getElementById('profileRemoveImageBtn').addEventListener('click', function() {
      selectedFileObject = null;
      profileImagePreview.src = '';
      profileImagePreviewContainer.style.display = 'none';
      profilePhotoInput.value = '';
      if (!profilePostContent.value.trim()) {
        profilePostContent.required = true;
      }
    });

    // 8. Profile Interactive Form Submission + Cloudinary Engine
    document.getElementById('profilePostForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      if (!supabaseClient) return;
      const textVal = profilePostContent.value.trim();
      const submitBtn = this.querySelector('.submit-post-btn');

      if (!textVal && !selectedFileObject) return;

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Uploading...';

        let finalCloudAssetUrl = null;

        if (selectedFileObject instanceof File && selectedFileObject.size > 0) {
          const uploadPayload = new FormData();
          uploadPayload.append('file', selectedFileObject);
          uploadPayload.append('upload_preset', CLOUDINARY_PRESET_NAME);

          const serverResponse = await fetch(CLOUDINARY_UPLOAD_URL, {
            method: 'POST',
            body: uploadPayload
          });

          if (!serverResponse.ok) {
            const errorDetails = await serverResponse.json().catch(() => ({}));
            throw new Error(errorDetails.error?.message || 'Cloudinary Asset upload failed.');
          }

          const parsedResponseData = await serverResponse.json();
          finalCloudAssetUrl = parsedResponseData.secure_url;
        }

        const { data: { user } } = await supabaseClient.auth.getUser();

        const { error } = await supabaseClient.from('posts').insert([
          {
            user_id: user.id,
            name: currentUser.name,
            email: currentUser.email,
            content: textVal,
            image_url: finalCloudAssetUrl,
            avatar_url: currentUser.photo,
            createdat: new Date().toISOString()
          }
        ]);

        if (error) throw error;

        profilePostContent.value = '';
        profilePostContent.style.height = 'auto';
        document.getElementById('profileRemoveImageBtn').click();
        await renderProfileTimeline();
      } catch (err) {
        alert(err.message || 'Error occurred handling cloud database submission loop.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Post';
      }
    });

    // 9. Render Profile Personal Timeline Feed Filtering
    async function renderProfileTimeline() {
      const feedElement = document.getElementById('profileTimelineFeed');
      if (!supabaseClient) {
        feedElement.innerHTML = '<p style="color:#64748b; text-align:center;">Configure Supabase to view timeline entries.</p>';
        return;
      }
      feedElement.innerHTML = '<p style="color:#64748b; text-align:center;">Filtering your personal updates timeline...</p>';

      try {
        const { data: posts, error } = await supabaseClient
          .from('posts')
          .select('*')
          .eq('email', currentUser.email)
          .order('createdat', { ascending: false });

        if (error) throw error;

        feedElement.innerHTML = '';
        if (!posts || posts.length === 0) {
          feedElement.innerHTML = '<p style="color:#64748b; text-align:center; padding: 24px 0;">No posts shared on your personal timeline yet.</p>';
          return;
        }

        posts.forEach(post => {
          const time = post.createdat ? new Date(post.createdat).toLocaleString() : 'Just now';
          const avatarSrc = currentUser.photo || "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiM0MzM4Y2EiLz48L3N2Zz4=";
          
          let textMarkup = post.content ? `<div class="thread-content" style="padding-left:0; margin-top:8px; color:#e2e8f0;">${post.content}</div>` : '';
          let imageMarkup = post.image_url ? `<img src="${post.image_url}" style="width:100%; border-radius:12px; margin-top:10px; max-height:350px; object-fit:cover; background:#11192e; border:1px solid #243249;" alt="Timeline Image Preview Post" />` : '';

          const card = document.createElement('div');
          card.className = 'thread-card';
          card.style.padding = '14px';
          card.innerHTML = `
            <div class="thread-header" style="margin-bottom:0;">
              <img class="thread-avatar" src="${avatarSrc}" style="width:34px; height:34px;">
              <div>
                <div class="thread-user">${post.name}</div>
                <div style="font-size:0.75rem; color:#64748b;">${time}</div>
              </div>
            </div>
            ${textMarkup}
            ${imageMarkup}
          `;
          feedElement.appendChild(card);
        });
      } catch (err) {
        feedElement.innerHTML = '<p style="color:#ef4444; text-align:center;">Failed to pull public timelines stream.</p>';
      }
    }

    // Initialize application execution loops safely
    document.addEventListener('DOMContentLoaded', () => {
      initUserProfile();
    });

    async function logout() {
      if (!supabaseClient) return;
      await supabaseClient.auth.signOut();
      localStorage.clear();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
