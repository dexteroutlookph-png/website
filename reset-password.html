<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | YouthSphere</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="speed-insights.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="brand-logo">
          <img src="isiedlogo.png" alt="ISIED logo" />
        </div>
        <div class="brand-copy">
          <span class="brand-name">ISIED</span>
          <span class="brand-subtext">Isabela South Ifugao East District</span>
        </div>
      </header>

      <main class="page-layout single-column">
        <section class="register-panel">
          <div class="login-card">
            <div class="login-header">
              <h2>Reset your password</h2>
              <p>Enter your email to find your account.</p>
            </div>

            <form id="resetForm" class="login-form" action="#" method="post">
              <label class="field-group">
                <span>Email Address</span>
                <input id="emailInput" type="email" name="email" placeholder="you@example.com" required />
              </label>

              <div id="formError" style="color:#b91c1c;min-height:18px"></div>

              <button type="submit" class="primary-button">Find Account</button>
            </form>

            <p class="register-text">
              Remembered your password? <a href="index.html">Sign in</a>
            </p>
          </div>
        </section>
      </main>
    </div>

    <script>
      const form = document.getElementById('resetForm');
      const emailInput = document.getElementById('emailInput');
      const errorEl = document.getElementById('formError');

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        errorEl.textContent = '';

        const email = emailInput.value.trim();
        if (!email) {
          errorEl.textContent = 'Please enter your email address.';
          return;
        }

        fetch('/api/registrations')
          .then((res) => res.json())
          .then((registrations) => {
            const match = registrations.find((entry) => entry.email === email);
            if (!match) {
              errorEl.textContent = 'No account found with that email address in the repository.';
              return;
            }
            window.location.href = `reset-password-confirm.html?email=${encodeURIComponent(email)}`;
          })
          .catch(() => {
            errorEl.textContent = 'Unable to verify account at the moment. Please try again later.';
          });
      });
    </script>
  </body>
</html>
