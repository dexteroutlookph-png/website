<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Register Step 2 | YouthSphere</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Clean Input Box Overrides */
      input[readonly] {
        background: transparent !important;
        color: inherit !important;
        cursor: default;
        opacity: 1 !important;
      }
      
      .login-header p {
        margin-top: 6px;
        font-size: 0.9rem;
        color: #94a3b8;
        line-height: 1.4;
      }

      /* Privacy Checkbox Styles */
      .policy-checkbox-group {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-top: 16px;
        margin-bottom: 16px;
        cursor: pointer;
        user-select: none;
      }

      .policy-checkbox-group input {
        margin-top: 3px;
        cursor: pointer;
      }

      .policy-text {
        font-size: 0.85rem;
        color: #94a3b8;
        line-height: 1.4;
      }

      .policy-text a {
        color: #6366f1;
        text-decoration: none;
        font-weight: 600;
      }

      .policy-text a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="brand-logo"><img src="isiedlogo.png" alt="ISIED logo" /></div>
        <div class="brand-copy">
          <span class="brand-name">ISIED</span>
          <span class="brand-subtext">Isabela South Ifugao East District</span>
        </div>
      </header>

      <main class="page-layout single-column">
        <section class="register-panel">
          <div class="login-card">
            <div class="login-header">
              <h2>Create Profile</h2>
              <p>Select Cluster and Local Church to complete registration.</p>
            </div>

            <form id="registerFormStep2" class="login-form">
              
              <label class="field-group">
                <span>Cluster</span>
                <select id="regCluster" required>
                  <option value="" disabled selected>Select Cluster</option>
                  <option value="Alfonso Lista Cluster">Alfonso Lista Cluster</option>
                  <option value="BRASO Cluster">BRASO Cluster</option>
                  <option value="Cabatuan Cluster">Cabatuan Cluster</option>
                  <option value="Ramon Cluster">Ramon Cluster</option>
                  <option value="San Mateo Cluster">San Mateo Cluster</option>
                  <option value="VillaSS Cluster">VillaSS Cluster</option>
                </select>
              </label>

              <label class="field-group">
                <span>Local Church</span>
                <select id="regChurch" required disabled>
                  <option value="" disabled selected>Select Local Church</option>
                </select>
              </label>

              <label class="policy-checkbox-group">
                <input type="checkbox" id="regPrivacy" required />
                <span class="policy-text">
                  I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and <a href="privacy.html" target="_blank">Privacy Policy</a> of YouthSphere.
                </span>
              </label>

              <div id="step2Error" style="color:#b91c1c; margin-bottom:10px; font-size:0.9rem;"></div>
              <button type="submit" class="primary-button">Continue</button>
            </form>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      // CRITICAL FIX: You MUST replace these placeholder strings with your actual Supabase Project details.
      const SUPABASE_URL = 'https://qymolbzmovnbiybpktqx.supabase.co'; 
      const SUPABASE_ANON_KEY = 'sb_publishable_ZUrTD9os3hvy_tBC6cfLVQ_U7zpjWFf';
      
      // Initializing the global client instance cleanly
      const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Alphabetically organized lookup registry data map
      const churchData = {
        "Alfonso Lista Cluster": [
          "Alfonso Lista First UMC",
          "Bagong Sikat UMC",
          "Namillangan UMC",
          "San Quintin UMC",
          "Sta. Maria MC",
          "Zion UMC"
        ],
        "BRASO Cluster": [
          "Burgos UMC",
          "General Aguinaldo UMC",
          "Oscariz UMC",
          "Rising Hope MC",
          "San Marcos UMC"
        ],
        "Cabatuan Cluster": [
          "Cabatuan UMC",
          "La Paz UMC",
          "Namnama UMC",
          "Tandul UMC"
        ],
        "Ramon Cluster": [
          "Aldersgate UMC",
          "Grace UMC",
          "Ramon UMC",
          "San Sebastian UMC",
          "Wesley UMC"
        ],
        "San Mateo Cluster": [
          "Gaddanan UMC",
          "Salinungan East UMC",
          "Salinungan West UMC",
          "San Mateo UMC",
          "The Crossroad UMC",
          "Victoria MC"
        ],
        "VillaSS Cluster": [
          "Sinamar Norte UMC",
          "Sinamar Sur UMC",
          "Villa Cruz UMC",
          "Villa Fuerte UMC",
          "Villa Magat UMC"
        ]
      };

      const clusterSelect = document.getElementById('regCluster');
      const churchSelect = document.getElementById('regChurch');
      const privacyCheck = document.getElementById('regPrivacy');
      const errorDisplay = document.getElementById('step2Error');

      // Dynamic update filtering implementation
      clusterSelect.addEventListener('change', function() {
        const selectedCluster = this.value;
        
        churchSelect.innerHTML = '<option value="" disabled selected>Select Local Church</option>';
        
        if (churchData[selectedCluster]) {
          churchSelect.disabled = false;
          churchData[selectedCluster].forEach(function(church) {
            const option = document.createElement('option');
            option.value = church;
            option.textContent = church;
            churchSelect.appendChild(option);
          });
        } else {
          churchSelect.disabled = true;
        }
      });

      document.getElementById('registerFormStep2').addEventListener('submit', async function(e) {
        e.preventDefault();
        errorDisplay.textContent = ''; 
        
        const clusterVal = clusterSelect.value;
        const churchVal = churchSelect.value;

        if (!clusterVal || !churchVal) {
          errorDisplay.textContent = 'Please make a selection for both fields.';
          return;
        }

        // Check validation status of privacy element explicitly
        if (!privacyCheck.checked) {
          errorDisplay.textContent = 'You must accept the Terms and Privacy Policy to continue.';
          return;
        }

        const step1Data = JSON.parse(localStorage.getItem('registrationStep1'));
        const base64Avatar = localStorage.getItem('croppedProfilePhoto');

        if (!step1Data) {
          errorDisplay.textContent = 'Registration session expired.';
          return;
        }

        try {
          // 1. Process identity registration details to Supabase Authentication engine
          const { data: authData, error: authError } = await supabaseClient.auth.signUp({
            email: step1Data.email,
            password: step1Data.password,
            options: {
              data: {
                full_name: step1Data.name
              }
            }
          });

          if (authError) throw authError;

          // 2. Insert complementary descriptive attributes directly into profiles dataset table
          if (authData.user) {
            const { error: profileError } = await supabaseClient.from('profiles').insert([{
                id: authData.user.id,
                full_name: step1Data.name,
                birthday: step1Data.birthday,
                age: parseInt(step1Data.age, 10),
                contact_number: step1Data.contactnumber,
                cluster: clusterVal,
                local_church: churchVal,
                avatar_url: base64Avatar 
              }]);

            if (profileError) throw profileError;
          }

          // 3. Clear transient local variables on successful database write completion
          localStorage.removeItem('registrationStep1');
          localStorage.removeItem('croppedProfilePhoto');
          
          window.location.href = 'login.html';

        } catch (err) {
          errorDisplay.textContent = err.message || 'An error occurred during submission. Please try again.';
        }
      });
    </script>
  </body>
</html>
