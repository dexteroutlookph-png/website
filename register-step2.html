<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouthSphere | Register</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="form-container">
    <h2>Complete Profile (Step 2)</h2>
    <form id="step2Form">
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <div class="input-group">
        <label for="birthday">Birthday</label>
        <input type="date" id="birthday" required>
      </div>
      <div class="input-group">
        <label for="age">Age</label>
        <input type="number" id="age" required min="1" max="120">
      </div>
      <div class="input-group">
        <label for="contactNumber">Contact Number</label>
        <input type="text" id="contactNumber" required placeholder="09123456789">
      </div>
      <div class="input-group">
        <label for="cluster">Cluster Selection</label>
        <input type="text" id="cluster" required placeholder="e.g. Cabatuan Cluster">
      </div>
      <div class="input-group">
        <label for="church">Local Church</label>
        <input type="text" id="church" required placeholder="e.g. District Central Church">
      </div>
      
      <div id="formError" style="color: #ef4444; font-size: 0.9rem; margin-bottom: 12px; font-weight: 500;"></div>
      <button type="submit" class="primary-button">Submit Registration</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('step2Form');
    const formError = document.getElementById('formError');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      formError.textContent = "";

      // 1. Pull Step 1 metadata cache objects 
      const step1Data = JSON.parse(localStorage.getItem('registrationStep1') || '{}');
      // 2. Extract our beautiful 1:1 cropped image string!
      const profilePhotoString = localStorage.getItem('croppedProfilePhoto') || "";

      if (!step1Data.name || !step1Data.email) {
        formError.textContent = "Session missing. Please go back and complete step 1.";
        return;
      }

      // 3. Assemble complete multi-part database payload
      const payload = {
        name: step1Data.name,
        email: step1Data.email,
        password: document.getElementById('password').value,
        birthday: document.getElementById('birthday').value,
        age: parseInt(document.getElementById('age').value),
        contactNumber: document.getElementById('contactNumber').value,
        cluster: document.getElementById('cluster').value,
        church: document.getElementById('church').value,
        photo: profilePhotoString // 👈 Passes the clean square photo string directly to server.js
      };

      // 4. Fire structured network stream off to Express handler
      fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(result => {
        if (result.success) {
          // Clean storage clear parameters on validation success
          localStorage.removeItem('croppedProfilePhoto');
          formError.style.color = '#16a34a';
          formError.textContent = "Account successfully registered! Sending to login layout...";
          
          setTimeout(() => {
            window.location.href = '/'; // Pull user clean onto landing login page
          }, 1500);
        } else {
          formError.textContent = result.error || 'Server rejected registration data.';
        }
      })
      .catch(() => {
        formError.textContent = "Network error. Failed to dispatch user bundle.";
      });
    });
  </script>
</body>
</html>
