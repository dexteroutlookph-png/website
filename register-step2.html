<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Register Step 2 | YouthSphere</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Clean Input Box Overrides */
      input[readonly] {
        background: transparent !important;
        color: inherit !important;
        cursor: default;
        opacity: 1 !important;
      }
      
      .login-header p {
        margin-top: 6px;
        font-size: 0.9rem;
        color: #94a3b8;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="brand-logo"><img src="isiedlogo.png" alt="ISIED logo" /></div>
        <div class="brand-copy">
          <span class="brand-name">ISIED</span>
          <span class="brand-subtext">Isabela South Ifugao East District</span>
        </div>
      </header>

      <main class="page-layout single-column">
        <section class="register-panel">
          <div class="login-card">
            <div class="login-header">
              <h2>Create Profile</h2>
              <p>Select Cluster and Local Church to complete registration.</p>
            </div>

            <form id="registerFormStep2" class="login-form">
              
              <label class="field-group">
                <span>Cluster</span>
                <select id="regCluster" required>
                  <option value="" disabled selected>Select Cluster</option>
                  <option value="Alfonso Lista Cluster">Alfonso Lista Cluster</option>
                  <option value="BRASO Cluster">BRASO Cluster</option>
                  <option value="Cabatuan Cluster">Cabatuan Cluster</option>
                  <option value="Ramon Cluster">Ramon Cluster</option>
                  <option value="San Mateo Cluster">San Mateo Cluster</option>
                  <option value="VillaSS Cluster">VillaSS Cluster</option>
                </select>
              </label>

              <label class="field-group">
                <span>Local Church</span>
                <select id="regChurch" required disabled>
                  <option value="" disabled selected>Select Local Church</option>
                </select>
              </label>

              <div id="step2Error" style="color:#b91c1c; margin-bottom:10px; font-size:0.9rem;"></div>
              <button type="submit" class="primary-button">Continue</button>
            </form>
          </div>
        </section>
      </main>
    </div>

    <script>
      // Alphabetically organized lookup registry data map
      const churchData = {
        "Alfonso Lista Cluster": [
          "Alfonso Lista First UMC",
          "Bagong Sikat UMC",
          "Namillangan UMC",
          "San Quintin UMC",
          "Sta. Maria MC",
          "Zion UMC"
        ],
        "BRASO Cluster": [
          "Burgos UMC",
          "General Aguinaldo UMC",
          "Oscariz UMC",
          "Rising Hope MC",
          "San Marcos UMC"
        ],
        "Cabatuan Cluster": [
          "Cabatuan UMC",
          "La Paz UMC",
          "Namnama UMC",
          "Tandul UMC"
        ],
        "Ramon Cluster": [
          "Aldersgate UMC",
          "Grace UMC",
          "Ramon UMC",
          "San Sebastian UMC",
          "Wesley UMC"
        ],
        "San Mateo Cluster": [
          "Gaddanan UMC",
          "Salinungan East UMC",
          "Salinungan West UMC",
          "San Mateo UMC",
          "The Crossroad UMC",
          "Victoria MC"
        ],
        "VillaSS Cluster": [
          "Sinamar Norte UMC",
          "Sinamar Sur UMC",
          "Villa Cruz UMC",
          "Villa Fuerte UMC",
          "Villa Magat UMC"
        ]
      };

      const clusterSelect = document.getElementById('regCluster');
      const churchSelect = document.getElementById('regChurch');

      // Dynamic update filtering implementation
      clusterSelect.addEventListener('change', function() {
        const selectedCluster = this.value;
        
        // Reset state cleanly
        churchSelect.innerHTML = '<option value="" disabled selected>Select Local Church</option>';
        
        if (churchData[selectedCluster]) {
          churchSelect.disabled = false;
          churchData[selectedCluster].forEach(function(church) {
            const option = document.createElement('option');
            option.value = church;
            option.textContent = church;
            churchSelect.appendChild(option);
          });
        } else {
          churchSelect.disabled = true;
        }
      });

      document.getElementById('registerFormStep2').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const clusterVal = clusterSelect.value;
        const churchVal = churchSelect.value;

        if (!clusterVal || !churchVal) {
          document.getElementById('step2Error').textContent = 'Please make a selection for both fields.';
          return;
        }

        const step1Data = JSON.parse(localStorage.getItem('registrationStep1')) || {};
        
        const completedProfilePayload = {
          ...step1Data,
          cluster: clusterVal,
          localChurch: churchVal
        };

        localStorage.setItem('registrationComplete', JSON.stringify(completedProfilePayload));
        window.location.href = 'index.html';
      });
    </script>
  </body>
</html>
