<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Register | YouthSphere</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="brand-logo"><img src="isiedlogo.png" alt="ISIED logo" /></div>
        <div class="brand-copy"><span class="brand-name">ISIED</span></div>
      </header>

      <main class="page-layout single-column">
        <section class="register-panel">
          <div class="login-card">
            <div class="login-header"><h2>Complete Profile (Step 2)</h2></div>
            <form id="step2Form" class="login-form">
              <label class="field-group">
                <span>Cluster</span>
                <select id="clusterSelect" required>
                  <option value="" disabled selected>Select cluster</option>
                  <option value="Alfonso Lista Cluster">Alfonso Lista Cluster</option>
                  <option value="BRASO Cluster">BRASO Cluster</option>
                  <option value="Cabatuan Cluster">Cabatuan Cluster</option>
                  <option value="San Mateo Cluster">San Mateo Cluster</option>
                </select>
              </label>
              <label class="field-group">
                <span>Local Church</span>
                <select id="churchSelect" required>
                  <option value="" disabled selected>Select church</option>
                  <option value="Alfonso Lista First UMC">Alfonso Lista First UMC</option>
                  <option value="Salinungan West UMC">Salinungan West UMC</option>
                  <option value="District Central Church">District Central Church</option>
                </select>
              </label>

              <div id="formError" style="color:#b91c1c; margin-bottom:10px; font-size:0.9rem;"></div>
              <button type="submit" class="primary-button">Submit Profile</button>
            </form>
          </div>
        </section>
      </main>
    </div>

    <script>
      document.getElementById('step2Form').addEventListener('submit', function(e) {
        e.preventDefault();
        const step1Data = JSON.parse(localStorage.getItem('registrationStep1') || '{}');
        const photoString = localStorage.getItem('croppedProfilePhoto') || "";

        if (!step1Data.name || !step1Data.email) {
          window.location.href = '/register';
          return;
        }

        const payload = {
          ...step1Data,
          cluster: document.getElementById('clusterSelect').value,
          church: document.getElementById('churchSelect').value,
          photo: photoString
        };

        fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(res => {
          if (!res.success) {
            document.getElementById('formError').textContent = res.error || 'Failed registration submission profile.';
            return;
          }
          localStorage.removeItem('registrationStep1');
          localStorage.removeItem('croppedProfilePhoto');
          window.location.href = '/';
        })
        .catch(() => { document.getElementById('formError').textContent = 'Network delivery failure error.'; });
      });
    </script>
  </body>
</html>
