<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Register | YouthSphere</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
    <style>
      /* Centered Circular Avatar Uploader Styles */
      .avatar-upload-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid #334155;
        width: 100%;
      }

      .avatar-trigger-circle {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 2px dashed #94a3b8;
        background: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: all 0.2s ease;
      }

      /* Inline Workspace container */
      .inline-crop-workspace {
        display: none;
        width: 100%;
        max-width: 300px;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 16px;
      }

      .inline-crop-area {
        width: 100%;
        height: 250px; 
        min-height: 250px;
        background: #0f172a;
        border-radius: 8px;
        overflow: hidden;
        position: relative;
      }

      .inline-crop-area img {
        display: block;
        max-width: 100%;
        max-height: 100%;
      }

      .crop-btn-row {
        display: flex;
        gap: 8px;
        justify-content: center;
      }

      .inline-action-btn {
        padding: 6px 14px;
        font-size: 0.8rem;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
      }

      .inline-save { background: #4f46e5; color: #fff; }
      .inline-cancel { background: #475569; color: #fff; }

      /* SVG Upload Symbol Arrow Inside Circle */
      .upload-symbol {
        width: 28px;
        height: 28px;
        fill: none;
        stroke: #475569;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: stroke 0.2s ease;
        display: block;
      }

      .avatar-trigger-circle:hover {
        border-color: #6366f1;
        background: #cbd5e1;
      }

      .avatar-trigger-circle:hover .upload-symbol {
        stroke: #6366f1;
      }

      /* Placed Cropped Image Preview Overlay */
      .avatar-preview-img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
        border-radius: 50%;
      }

      .avatar-label-text {
        margin-top: 10px;
        font-size: 0.85rem;
        color: #94a3b8;
        font-weight: 600;
        letter-spacing: 0.3px;
      }

      /* Hide Native File Input Component Completely */
      .hidden-file-input {
        display: none !important;
      }

      /* Clean Input Box Overrides */
      input[readonly] {
        background: transparent !important;
        color: inherit !important;
        cursor: default;
        opacity: 1 !important;
      }

      #regBirthday {
        font-family: monospace;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="brand-logo"><img src="isiedlogo.png" alt="ISIED logo" /></div>
        <div class="brand-copy">
          <span class="brand-name">ISIED</span>
          <span class="brand-subtext">Isabela South Ifugao East District</span>
        </div>
      </header>

      <main class="page-layout single-column">
        <section class="register-panel">
          <div class="login-card">
            <div class="login-header">
              <h2>Create Profile</h2>
            </div>

            <form id="registerForm" class="login-form">
              
              <div class="avatar-upload-container">
                <div id="circleTrigger" class="avatar-trigger-circle" onclick="document.getElementById('photoInput').click()">
                  <svg id="uploadIconSymbol" class="upload-symbol" viewBox="0 0 24 24">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                  </svg>
                  <img id="avatarDisplayCircle" class="avatar-preview-img" alt="Profile Preview">
                </div>

                <div id="inlineCropWorkspace" class="inline-crop-workspace">
                  <div class="inline-crop-area">
                    <img id="cropTargetImage" alt="To Crop">
                  </div>
                  <div class="crop-btn-row">
                    <button type="button" id="inlineCancelBtn" class="inline-action-btn inline-cancel">Cancel</button>
                    <button type="button" id="inlineSaveBtn" class="inline-action-btn inline-save">Save</button>
                  </div>
                </div>

                <div id="avatarLabel" class="avatar-label-text">Select YouthSphere Photo</div>
                <input type="file" id="photoInput" class="hidden-file-input" accept="image/*" />
              </div>

              <label class="field-group"><span>Full Name</span><input type="text" id="regName" required /></label>
              <label class="field-group"><span>Email</span><input type="email" id="regEmail" placeholder="you@example.com" required /></label>
              <label class="field-group"><span>Password</span><input type="password" id="regPassword" required /></label>
              <label class="field-group"><span>Birthday</span><input type="text" id="regBirthday" maxlength="10" placeholder="mm/dd/yyyy" required /></label>
              <label class="field-group"><span>Age</span><input type="number" id="regAge" readonly required /></label>
              <label class="field-group"><span>Contact Number</span><input type="text" id="regContact" placeholder="09123456789" required /></label>

              <div id="step1Error" style="color:#b91c1c; margin-bottom:10px; font-size:0.9rem;"></div>
              <button type="submit" class="primary-button">Continue</button>
            </form>
          </div>
        </section>
      </main>
    </div>

    <script>
      let cropper = null;
      const circleTrigger = document.getElementById('circleTrigger');
      const inlineWorkspace = document.getElementById('inlineCropWorkspace');
      const cropTargetImage = document.getElementById('cropTargetImage');
      const uploadIconSymbol = document.getElementById('uploadIconSymbol');
      const avatarDisplayCircle = document.getElementById('avatarDisplayCircle');
      const avatarLabel = document.getElementById('avatarLabel');
      const photoInput = document.getElementById('photoInput');

      // 1. Image selection setup logic
      photoInput.addEventListener('change', function(e) {
        if (e.target.files && e.target.files.length > 0) {
          const reader = new FileReader();
          reader.onload = function(event) {
            if (cropper) {
              cropper.destroy();
              cropper = null;
            }

            cropTargetImage.src = event.target.result;
            
            circleTrigger.style.display = 'none';
            avatarLabel.style.display = 'none';
            inlineWorkspace.style.display = 'flex';

            cropper = new Cropper(cropTargetImage, { 
              aspectRatio: 1, 
              viewMode: 1,
              autoCropArea: 1,
              responsive: true,
              checkOrientation: false
            });
          };
          reader.readAsDataURL(e.target.files[0]);
        }
      });

      // 2. Crop Save Action
      document.getElementById('inlineSaveBtn').addEventListener('click', function() {
        if (cropper) {
          const canvas = cropper.getCroppedCanvas({ width: 300, height: 300 });
          const base64Image = canvas.toDataURL('image/jpeg', 0.8);
          
          localStorage.setItem('croppedProfilePhoto', base64Image);
          
          cropper.destroy();
          cropper = null;

          uploadIconSymbol.style.display = 'none';
          avatarDisplayCircle.src = base64Image;
          avatarDisplayCircle.style.display = 'block';
          
          inlineWorkspace.style.display = 'none';
          circleTrigger.style.display = 'flex';
          avatarLabel.style.display = 'block';
        }
      });

      // 3. Crop Cancel Action
      document.getElementById('inlineCancelBtn').addEventListener('click', function() {
        if (cropper) {
          cropper.destroy();
          cropper = null;
        }
        inlineWorkspace.style.display = 'none';
        circleTrigger.style.display = 'flex';
        avatarLabel.style.display = 'block';
        photoInput.value = "";
      });

      // Interactive Fixed Mobile-Friendly Masking Engine for mm/dd/yyyy
      const birthdayInput = document.getElementById('regBirthday');
      const ageInput = document.getElementById('regAge');

      birthdayInput.addEventListener('input', function(e) {
        document.getElementById('step1Error').textContent = '';

        // Extract raw digits only to remain fully safe from mobile predictive text variations
        let digits = this.value.replace(/\D/g, '');
        
        if (digits.length > 8) {
          digits = digits.substring(0, 8);
        }

        // Dynamically append slashes according to current numeric string layout depth
        let formatted = '';
        if (digits.length > 0) {
          formatted += digits.substring(0, 2);
        }
        if (digits.length > 2) {
          formatted += '/' + digits.substring(2, 4);
        }
        if (digits.length > 4) {
          formatted += '/' + digits.substring(4, 8);
        }

        this.value = formatted;

        // Perform automated age valuation checks only upon full date entry completion
        if (digits.length === 8) {
          triggerAgeCalculation(formatted);
        } else {
          ageInput.value = '';
        }
      });

      function triggerAgeCalculation(currentString) {
        const parts = currentString.split('/');
        if (parts.length !== 3) return;

        const month = parseInt(parts[0], 10);
        const day = parseInt(parts[1], 10);
        const year = parseInt(parts[2], 10);

        if (year > 1900 && month >= 1 && month <= 12 && day >= 1 && day <= 31) {
          const birthDate = new Date(year, month - 1, day);
          const today = new Date();

          if (birthDate.getFullYear() === year && birthDate.getMonth() === month - 1 && birthDate.getDate() === day && birthDate <= today) {
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
              age--;
            }
            ageInput.value = age;
            return;
          }
        }
        ageInput.value = '';
      }

      document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        if (!localStorage.getItem('croppedProfilePhoto')) {
          document.getElementById('step1Error').textContent = 'Please select and crop your profile photo first.';
          return;
        }
        if (!ageInput.value) {
          document.getElementById('step1Error').textContent = 'Please enter a complete and valid birthday (mm/dd/yyyy).';
          return;
        }
        
        localStorage.setItem('registrationStep1', JSON.stringify({
          name: document.getElementById('regName').value.trim(),
          email: document.getElementById('regEmail').value.trim().toLowerCase(),
          password: document.getElementById('regPassword').value,
          birthday: birthdayInput.value,
          age: ageInput.value,
          contactnumber: document.getElementById('regContact').value.trim()
        }));
        
        window.location.href = 'register-step2.html';
      });
    </script>
  </body>
</html>
