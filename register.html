<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouthSphere | Register</title>
  <link rel="stylesheet" href="styles.css">
  
  <!-- CROPPER.JS STYLESHEET & SCRIPT ASSETS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
</head>
<body>

  <div class="form-container">
    <h2>Create Account (Step 1)</h2>
    <form id="step1Form">
      <div class="input-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" required placeholder="John Doe">
      </div>
      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required placeholder="johndoe@email.com">
      </div>
      <div class="input-group">
        <label for="photo">Profile Photo</label>
        <!-- Custom file trigger -->
        <input type="file" id="photo" accept="image/*" required>
      </div>
      
      <button type="submit" class="primary-button">Next Step</button>
    </form>
  </div>

  <!-- INTERACTIVE 1:1 IMAGE CROPPING MODAL OVERLAY -->
  <div id="cropModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.9); z-index:9999; align-items:center; justify-content:center; padding:20px;">
    <div style="background:#1e293b; max-width:450px; width:100%; padding:20px; border-radius:16px; border:1px solid #334155; box-shadow:0 10px 25px rgba(0,0,0,0.3); font-family: sans-serif;">
      <h3 style="margin-top:0; color:#fff;">Crop Profile Photo</h3>
      <p style="color:#94a3b8; font-size:0.85rem; margin-bottom:15px;">Please adjust your image boundaries into a clean square format.</p>
      
      <div style="max-height:300px; overflow:hidden; background:#0f172a; border-radius:8px; margin-bottom:20px;">
        <img id="cropPreviewImage" style="max-width:100%; display:block;">
      </div>
      
      <div style="display:flex; gap:10px; justify-content:flex-end;">
        <button type="button" id="cancelCropBtn" style="background:#475569; color:#fff; border:none; padding:10px 16px; border-radius:8px; cursor:pointer;">Cancel</button>
        <button type="button" id="saveCropBtn" style="background:#4f46e5; color:#fff; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">Apply Crop</button>
      </div>
    </div>
  </div>

  <script>
    let cropperInstance = null;
    let base64CroppedImage = "";

    const form = document.getElementById('step1Form');
    const photoInput = document.getElementById('photo');
    const cropModal = document.getElementById('cropModal');
    const cropPreviewImage = document.getElementById('cropPreviewImage');
    const saveCropBtn = document.getElementById('saveCropBtn');
    const cancelCropBtn = document.getElementById('cancelCropBtn');

    // 1. Listen for image changes and trigger modal workspace
    photoInput.addEventListener('change', function(e) {
      const files = e.target.files;
      if (files && files.length > 0) {
        const file = files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
          cropPreviewImage.src = event.target.result;
          cropModal.style.display = 'flex';
          
          if (cropperInstance) cropperInstance.destroy();
          
          cropperInstance = new Cropper(cropPreviewImage, {
            aspectRatio: 1, // FORCES SQUARE 1:1 RATIO
            viewMode: 1,
            background: false,
            autoCropArea: 1
          });
        };
        reader.readAsDataURL(file);
      }
    });

    // 2. Process Cropped image to Base64 
    saveCropBtn.addEventListener('click', function() {
      if (cropperInstance) {
        const canvas = cropperInstance.getCroppedCanvas({ width: 400, height: 400 });
        base64CroppedImage = canvas.toDataURL('image/jpeg', 0.85);
        cropModal.style.display = 'none';
        
        // Temporarily hold image string on user machine
        localStorage.setItem('croppedProfilePhoto', base64CroppedImage);
      }
    });

    // 3. Graceful cancel handling
    cancelCropBtn.addEventListener('click', function() {
      cropModal.style.display = 'none';
      photoInput.value = "";
      if (cropperInstance) cropperInstance.destroy();
    });

    // 4. Handle navigation forward
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      if (!localStorage.getItem('croppedProfilePhoto')) {
        alert("Please make sure to apply your profile image cropping settings first!");
        return;
      }

      const basicInfo = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value
      };

      localStorage.setItem('registrationStep1', JSON.stringify(basicInfo));
      window.location.href = '/register-step2'; // Smooth navigation route redirection
    });
  </script>
</body>
</html>
