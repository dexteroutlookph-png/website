<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Register | YouthSphere</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="brand-logo"><img src="isiedlogo.png" alt="ISIED logo" /></div>
        <div class="brand-copy"><span class="brand-name">ISIED</span></div>
      </header>

      <main class="page-layout single-column">
        <section class="register-panel">
          <div class="login-card">
            <div class="login-header">
              <h2>Create Profile (Step 1)</h2>
            </div>

            <form id="registerForm" class="login-form">
              <label class="field-group"><span>Full Name</span><input type="text" id="regName" required /></label>
              <label class="field-group"><span>Email</span><input type="email" id="regEmail" required /></label>
              <label class="field-group"><span>Password</span><input type="password" id="regPassword" required /></label>
              <label class="field-group"><span>Birthday</span><input type="date" id="regBirthday" required /></label>
              <label class="field-group"><span>Age</span><input type="number" id="regAge" required /></label>
              <label class="field-group"><span>Contact Number</span><input type="text" id="regContact" required /></label>
              <label class="field-group"><span>Avatar</span><input type="file" id="photoInput" accept="image/*" required /></label>

              <div id="step1Error" style="color:#b91c1c; margin-bottom:10px; font-size:0.9rem;"></div>
              <button type="submit" class="primary-button">Continue to Step 2</button>
            </form>
          </div>
        </section>
      </main>
    </div>

    <div id="cropModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.9); z-index:9999; align-items:center; justify-content:center; padding:20px;">
      <div style="background:#1e293b; max-width:450px; width:100%; padding:20px; border-radius:16px;">
        <div style="max-height:300px; overflow:hidden; background:#0f172a; margin-bottom:20px;">
          <img id="cropPreviewImage" style="max-width:100%;">
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
          <button type="button" id="cancelCropBtn" style="background:#475569; color:#fff; border:none; padding:10px; border-radius:8px;">Cancel</button>
          <button type="button" id="saveCropBtn" style="background:#4f46e5; color:#fff; border:none; padding:10px; border-radius:8px; font-weight:bold;">Apply Crop</button>
        </div>
      </div>
    </div>

    <script>
      let cropper = null;
      document.getElementById('photoInput').addEventListener('change', function(e) {
        if (e.target.files && e.target.files.length > 0) {
          const reader = new FileReader();
          reader.onload = function(event) {
            document.getElementById('cropPreviewImage').src = event.target.result;
            document.getElementById('cropModal').style.display = 'flex';
            if (cropper) cropper.destroy();
            cropper = new Cropper(document.getElementById('cropPreviewImage'), { aspectRatio: 1, viewMode: 1 });
          };
          reader.readAsDataURL(e.target.files[0]);
        }
      });

      document.getElementById('saveCropBtn').addEventListener('click', function() {
        if (cropper) {
          const canvas = cropper.getCroppedCanvas({ width: 300, height: 300 });
          localStorage.setItem('croppedProfilePhoto', canvas.toDataURL('image/jpeg', 0.8));
          document.getElementById('cropModal').style.display = 'none';
        }
      });

      document.getElementById('cancelCropBtn').addEventListener('click', function() {
        document.getElementById('cropModal').style.display = 'none';
        document.getElementById('photoInput').value = "";
      });

      document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        if (!localStorage.getItem('croppedProfilePhoto')) {
          document.getElementById('step1Error').textContent = 'Please crop your image profile first.';
          return;
        }
        localStorage.setItem('registrationStep1', JSON.stringify({
          name: document.getElementById('regName').value.trim(),
          email: document.getElementById('regEmail').value.trim(),
          password: document.getElementById('regPassword').value,
          birthday: document.getElementById('regBirthday').value,
          age: document.getElementById('regAge').value,
          contactnumber: document.getElementById('regContact').value.trim()
        }));
        window.location.href = '/register-step2';
      });
    </script>
  </body>
</html>
