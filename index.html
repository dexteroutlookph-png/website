<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouthSphere | Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="brand-logo"><img src="isiedlogo.png" alt="ISIED logo" /></div>
        <div class="brand-copy">
          <span class="brand-name">ISIED</span>
          <span class="brand-subtext">Isabela South Ifugao East District</span>
        </div>
      </header>

      <main class="page-layout">
        <section class="hero-panel">
          <div>
            <h1>ISIED <span>YouthSphere</span></h1>
            <p>A centralized social engine built to connect district church members and track community updates.</p>
          </div>
        </section>

        <section class="login-panel">
          <div class="login-card">
            <div class="login-header">
              <h2>Welcome Back</h2>
              <p>Sign in to enter your social feed</p>
            </div>

            <form id="loginForm" class="login-form">
              <label class="field-group">
                <span>Email Address</span>
                <input id="loginEmail" type="email" placeholder="you@example.com" required />
              </label>
              <label class="field-group">
                <span>Password</span>
                <input id="loginPassword" type="password" placeholder="••••••••" required />
              </label>

              <div id="loginError" style="color:#b91c1c; min-height:18px; margin-bottom:12px; font-size:0.9rem;"></div>
              <button type="submit" class="primary-button">Sign In</button>
            </form>
            <p class="register-text">Don't have an account? <a href="register.html">Register here</a></p>
          </div>
        </section>
      </main>
    </div>

    <script>
      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const errorEl = document.getElementById('loginError');
        errorEl.textContent = '';

        const email = document.getElementById('loginEmail').value.trim().toLowerCase();
        const password = document.getElementById('loginPassword').value;

        fetch('/api/registrations')
          .then(res => res.json())
          .then(users => {
            const match = users.find(u => u.email.toLowerCase() === email);
            if (!match || match.password !== password) {
              errorEl.textContent = 'Invalid email or password.';
              return;
            }

            localStorage.setItem('registrationStep1', JSON.stringify({
              name: match.name, email: match.email, cluster: match.cluster, church: match.church, photo: match.photo || ""
            }));

            errorEl.style.color = '#16a34a';
            errorEl.textContent = 'Verified! Accessing dashboard...';
            setTimeout(() => { window.location.href = 'homepage.html'; }, 1000);
          })
          .catch(() => { errorEl.textContent = 'Could not process login pipeline.'; });
      });
    </script>
  </body>
</html>
