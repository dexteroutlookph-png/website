<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm Reset | YouthSphere</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="speed-insights.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="brand-logo">
          <img src="isiedlogo.png" alt="ISIED logo" />
        </div>
        <div class="brand-copy">
          <span class="brand-name">ISIED</span>
          <span class="brand-subtext">Isabela South Ifugao East District</span>
        </div>
      </header>

      <main class="page-layout single-column">
        <section class="register-panel">
          <div class="login-card">
            <div class="login-header">
              <h2>Confirm account</h2>
              <p>Enter a new password for your account.</p>
            </div>

            <form id="confirmForm" class="login-form" action="#" method="post">
              <label class="field-group">
                <span>New Password</span>
                <input id="newPassword" type="password" placeholder="Enter new password" required />
              </label>

              <div id="formError" style="color:#b91c1c;min-height:18px"></div>

              <button type="submit" class="primary-button">Reset Password</button>
            </form>

            <p class="register-text">
              Back to <a href="index.html">Sign in</a>
            </p>
          </div>
        </section>
      </main>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const email = params.get('email');
      const errorEl = document.getElementById('formError');
      const confirmForm = document.getElementById('confirmForm');
      const newPasswordInput = document.getElementById('newPassword');

      if (!email) {
        errorEl.textContent = 'Invalid reset link. Please start again.';
        confirmForm.querySelector('button').disabled = true;
      } else {
        fetch('/api/registrations')
          .then((res) => res.json())
          .then((registrations) => {
            const match = registrations.find((entry) => entry.email === email);
            if (!match) {
              errorEl.textContent = 'No account found with that email address in the repository.';
              confirmForm.querySelector('button').disabled = true;
            }
          })
          .catch(() => {
            errorEl.textContent = 'Unable to verify account. Please try again later.';
            confirmForm.querySelector('button').disabled = true;
          });
      }

      confirmForm.addEventListener('submit', function (e) {
        e.preventDefault();
        errorEl.textContent = '';

        const password = newPasswordInput.value.trim();
        if (password.length < 8) {
          errorEl.textContent = 'Password must be at least 8 characters.';
          return;
        }

        fetch('/api/registrations')
          .then((res) => res.json())
          .then((registrations) => {
            const match = registrations.find((entry) => entry.email === email);
            if (!match) {
              errorEl.textContent = 'No account found with that email address.';
              return;
            }
            return fetch('/api/reset-password', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ id: match.id, password })
            });
          })
          .then((response) => {
            if (!response) return;
            return response.json();
          })
          .then((result) => {
            if (!result) return;
            if (!result.success) {
              errorEl.textContent = result.error || 'Unable to reset password.';
              return;
            }
            errorEl.style.color = '#16a34a';
            errorEl.textContent = 'Password reset successfully. Redirecting to login...';
            setTimeout(() => {
              window.location.href = 'index.html';
            }, 1200);
          })
          .catch(() => {
            errorEl.textContent = 'Unable to reset password. Please try again later.';
          });
      });
    </script>
  </body>
</html>
